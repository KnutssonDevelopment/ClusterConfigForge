<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESXi Host Configuration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">ESXi Host Profile Loader</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/load-json" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="file" class="form-label font-monospace">Upload JSON Profile</label>
                        <input type="file" name="file" id="file" class="form-control" accept=".json" required>
                    </div>
                    <button type="submit" class="btn btn-primary px-4">Load Data</button>
                </form>
            </div>
        </div>

        {% if hosts %}
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span>Extracted Host Configurations</span>
                <span class="badge bg-secondary">{{ hosts|length }} Hosts Found</span>
            </div>
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 30%;">Hostname</th>
                            <th style="width: 25%;">Management IP</th>
                            <th style="width: 45%;">UUID (Immutable)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for host in hosts %}
                        <tr>
                            <td>
                                <input type="text" class="form-control fw-bold" value="{{ host.hostname }}" placeholder="Enter hostname...">
                            </td>
                            <td>
                                <input type="text" class="form-control" value="{{ host.management_ip }}" placeholder="0.0.0.0">
                            </td>
                            <td>
                                <input type="text" class="form-control-plaintext text-muted small" value="{{ host.uuid }}" readonly>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <div class="mt-3 text-end">
                    <button class="btn btn-success px-4" onclick="alert('Ready to save changes!')">Save Configuration</button>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
